version: "v0.1"
title: "Cline 开发业务规则（草案）"
description: >
  将《cline/rules/1.md》中的开发规范结构化为可维护、可校验的 clinerules 配置。
  目的：降低耦合、避免硬编码、提升可维护性与审查效率。
i18n_required: true   # 所有对外显示/用户可见文本必须使用 $t() 国际化函数

core_principles:
  - name: "低耦合"
    level: "MUST"
    summary: "模块间通过明确接口/服务/事件交互，禁止直接依赖实现细节。"
  - name: "单一职责"
    level: "MUST"
    summary: "类/方法应只做一件事，便于理解、测试与复用。"
  - name: "避免魔法数字"
    level: "MUST"
    summary: "业务常量集中管理（constants/），使用枚举或常量对象。"
  - name: "可读与简洁"
    level: "SHOULD"
    summary: "优先简单可读实现，避免不必要的复杂抽象。"
  - name: "可维护性"
    level: "SHOULD"
    summary: "命名清晰、边界情况明确，复杂逻辑说明“为什么这样做”。"

rules:
  - id: R001
    name: "低耦合"
    level: "MUST"
    description: "模块之间仅通过接口/服务/事件通信，内部实现隐藏。禁止跨模块直接访问实现类或内部状态。"
    checkpoints:
      - "无跨模块直接引用实现类或内部私有状态"
      - "使用接口/服务契约、事件或 RPC 进行边界通信"
    auto_checks:
      - type: "static"
        suggestion: "ESLint: 禁止 import 跨越 domain/spread（自定义规则）或 检查路径层级"
    examples:
      correct: "通过 IUserService 接口获取用户信息"
      incorrect: "在另一个模块直接 import 并调用 UserRepository 实现"

  - id: R002
    name: "业务常量集中管理"
    level: "MUST"
    description: "状态值、类型、超时、API 地址等禁止裸写在业务代码中，应集中到 constants/ 或配置文件并使用枚举。"
    checkpoints:
      - "是否存在硬编码字符串/数字（如超时时间、状态码、API 地址）"
      - "常量是否在 constants/ 或配置中心定义并引用"
    auto_checks:
      - type: "lint"
        suggestion: "ESLint/TS rule: 检查 magic numbers 与 magic strings（可自定义禁用列表）"
    examples:
      correct: "constants/timeout.ts: export const REQUEST_TIMEOUT_MS = 5000"
      incorrect: "fetch(url, { timeout: 5000 }) // 直接硬编码"

  - id: R003
    name: "单一职责与方法长度限制"
    level: "MUST/SHOULD"
    description: "方法应表达单一动作，建议不超过 50 行、参数不超过 5 个；复杂逻辑拆分为服务/工具。"
    checkpoints:
      - "函数/方法是否过长（>50 行）"
      - "参数数量是否 >5"
      - "是否存在混合多种职责的函数"
    auto_checks:
      - type: "static"
        suggestion: "ESLint: max-lines-per-function、max-params"
    examples:
      correct: "单一职责的 service 方法，每个步骤委托到私有函数"
      incorrect: "Controller 中执行大量业务逻辑、数据库与网络调用混杂"

  - id: R004
    name: "命名规范"
    level: "MUST"
    description: "变量、方法、类应清晰表达业务意图，禁止无意义命名（如 arr1、tmp）。"
    checkpoints:
      - "是否存在无语义或误导性命名"
      - "是否遵循项目命名约定（camelCase / PascalCase）"
    auto_checks:
      - type: "review"
        suggestion: "代码审查中关注命名语义；可引入 linter 插件检查常见不良命名"
    examples:
      correct: "fetchUser、submitOrder"
      incorrect: "arr1、tmp、doStuff"

  - id: R005
    name: "控制副作用"
    level: "MUST"
    description: "副作用应显式、可控；UI 组件尽量避免直接包含大量业务逻辑，副作用需封装并可测试。"
    checkpoints:
      - "组件中是否存在未封装的业务逻辑或直接修改全局状态"
      - "副作用是否集中到可测试的 service/side-effect 层"
    auto_checks:
      - type: "static"
        suggestion: "寻查 UI 层引用 service 外的网络/数据库操作（自定义检测）"
    examples:
      correct: "组件调用 useUserService() 并仅渲染数据"
      incorrect: "组件内部直接发起 fetch 并处理大量业务逻辑"

  - id: R006
    name: "抽象与复用策略"
    level: "SHOULD"
    description: "以“3 次重复”为提取复用参考阈值；避免为假想需求过早抽象。"
    checkpoints:
      - "是否为少量重复创建复杂抽象"
      - "现有抽象是否清晰且理由充分"
    examples:
      correct: "三处相似实现提取到公共 util"
      incorrect: "为单次或两次使用创建过度复杂的框架层"

  - id: R007
    name: "错误处理与可见性"
    level: "MUST"
    description: "异步操作需显式捕获并向用户/监控暴露可理解错误信息，不泄露内网/堆栈敏感信息。"
    checkpoints:
      - "异步调用是否有统一错误处理或 try/catch"
      - "前端是否向用户显示友好错误信息或错误码"
      - "后端是否记录足够的监控日志且不暴露敏感信息"
    auto_checks:
      - type: "test"
        suggestion: "覆盖率对关键错误路径添加单元/集成测试"
    examples:
      correct: "try { await svc() } catch (e) { report(e); showFriendlyError() }"
      incorrect: "未捕获的 Promise 导致应用崩溃或显示原始堆栈"

  - id: R008
    name: "代码审查与例外流程"
    level: "SHOULD"
    description: "规则分级（MUST/SHOULD/OPTIONAL），例外需在 PR 中说明并指定审批人。"
    checkpoints:
      - "PR 是否包含对规则例外的说明与审批记录"
      - "重大变更是否包含影响评估"
    examples:
      correct: "PR 描述中列出例外原因并 @架构审阅人"
      incorrect: "在未说明的情况下强制跳过规则"

executable_requirements:
  description: "将 MUST 规则映射为可自动校验项，供 CI/ESLint/TS 使用。"
  mapping:
    R001:
      - type: "eslint-plugin"
        note: "自定义规则：禁止跨层 import（按路径深度或域名约束）"
    R002:
      - type: "eslint-rule"
        note: "禁止 magic numbers/strings 或 强制常量引用（可用 eslint-plugin-no-magic-numbers）"
    R003:
      - type: "eslint"
        note: "max-lines-per-function、max-params"
    R007:
      - type: "ci-test"
        note: "覆盖关键错误路径的单元/集成测试"

maintenance:
  changelog: "CHANGELOG.md (每次修改须更新版本号与变更说明，记录变更理由与影响范围)"
  approval: "规则变更由架构/维护团队审批，重大变更需在 PR 中评估影响并通知相关团队"
  versioning: "语义化版本与发布说明（major/minor/patch）"

placeholders_and_next_steps:
  - "为每条规则补充 1 个正确示例与 1 个错误示例（最小可复现）"
  - "提供示例 ESLint/TS 配置与 CI 校验脚本（注释或示例文件）"
  - "实现自动化校验（逐步将自定义规则纳入 eslint-plugin 或 CI 脚本）"
  - "将本文件加入仓库规则目录并在 PR 模板中强制引用"

