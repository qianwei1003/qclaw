version: "v0.1"
title: "Cline 核心开发守则"
description: "面向 Cline 平台核心代码的开发规范，定义模块边界、命名、常量管理、职责划分与副作用控制，便于审查与长期维护。"

core_principles:
  - name: "低耦合"
    level: "MUST"
    summary: "模块间通过明确接口/服务/事件交互，避免直接依赖实现细节。"
  - name: "单一职责"
    level: "MUST"
    summary: "类/函数/模块应只负责单一业务职责，便于理解与测试。"
  - name: "避免魔法数字"
    level: "MUST"
    summary: "业务常量集中管理，禁止在业务代码中裸写数字/字符串。"
  - name: "清晰与可维护"
    level: "SHOULD"
    summary: "命名清晰、边界明确，复杂处说明设计理由并添加必要注释。"

rules:
  - id: R001
    name: "低耦合"
    level: "MUST"
    description: "通过接口/服务/事件进行模块边界通信，禁止跨模块直接依赖实现细节。"
    checkpoints:
      - "通过服务契约或接口调用，而非直接 new/导入实现类"
      - "遵循仓库/模块分层与域边界"

  - id: R002
    name: "业务常量集中管理"
    level: "MUST"
    description: "状态码、超时、API 地址等应集中管理并命名规范，禁止在业务代码中裸写。"
    checkpoints:
      - "是否存在硬编码数字/字符串（timeout、URL、状态值）"
      - "是否从 constants/ 或配置中心读取"

  - id: R003
    name: "单一职责与方法长度"
    level: "MUST/SHOULD"
    description: "函数/方法聚焦单一动作，复杂逻辑拆分为小服务或私有函数，便于测试。"
    checkpoints:
      - "函数是否包含多种职责"
      - "是否超过建议行数或参数数量（建议 max 50 行 / max 5 参数）"

  - id: R004
    name: "命名规范"
    level: "MUST"
    description: "命名应清晰表达业务意图，避免无语义或误导性命名。"
    checkpoints:
      - "存在 arr1/tmp/doStuff 等无意义命名？"
      - "是否遵循项目命名约定（camelCase / PascalCase）"

  - id: R005
    name: "控制副作用"
    level: "MUST"
    description: "副作用（网络、DB、全局状态修改）应集中管理并封装，UI 层仅负责渲染。"
    checkpoints:
      - "组件/模块内是否存在未经封装的网络或 DB 操作"
      - "副作用是否位于可测试的 service/side-effect 层"

  - id: R006
    name: "抽象与复用策略"
    level: "SHOULD"
    description: "以实用为先，避免为少量重复提前抽象，推荐在至少 3 处重复后提取复用。"
    checkpoints:
      - "是否为少量重复创建复杂抽象"
      - "已提取抽象是否语义清晰且被复用"

  - id: R007
    name: "最小改动原则"
    level: "MUST"
    description: "只修改用户明确要求的代码范围；禁止为“看起来可以优化”而改动周边代码；禁止重命名、调整代码顺序、删除注释、顺手修复 lint 或顺便优化性能。"
    checkpoints:
      - "改动是否限定在用户明确要求的范围"
      - "是否包含重命名、代码顺序调整或注释删除"
      - "PR 是否说明改动文件、行号、修改原因并关联用户需求"

  - id: R008
    name: "改动报告机制"
    level: "MUST"
    description: "每次改动必须生成改动报告，包含摘要、文件/行号、改动类型与原因，并列出被检测但未执行的建议项（供审查）。"
    checkpoints:
      - "PR 或提交是否附带改动报告（摘要 + 文件变化行号 + 改动原因）"
      - "报告是否列出被检测但跳过的建议（例如 v-if->v-show 的建议但未改动）"
    examples:
      correct: "UserList.vue:45-50 新增搜索（用户要求）；UserList.vue:23 建议 v-show（已记录但未改动）"
      incorrect: "未在 PR 中说明改动范围或未提交改动报告"

maintenance:
  changelog: "CHANGELOG.md（修改时请更新版本号与变更说明）"
  approval: "规则变更需经架构/维护团队审批，重大变更在 PR 中评估影响并通知相关团队"
