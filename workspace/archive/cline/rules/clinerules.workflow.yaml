version: "v0.1"
title: "Cline 工作流优化规则"
description: "Diff First 工作流，确保代码改动前充分 review，禁止全文件输出，强制逐个确认。"

core_principles:
  - name: "Diff First"
    level: "MUST"
    summary: "用户要代码时，给 diff 格式，不给整个文件。"
  - name: "逐个确认"
    level: "MUST"
    summary: "多文件改动时，逐个展示 + 逐个确认，不要一次性全改。"
  - name: "改动前预览"
    level: "MUST"
    summary: "改动 >3 行或多文件时，必须等用户确认（yes/执行/确认）。"
  - name: "透明化"
    level: "MUST"
    summary: "方案 + 代码片段同时给出，不直接要求执行。"

rules:
  - id: W001
    name: "提方案时的行为"
    level: "MUST"
    description: "输出完整方案时，同时给出关键代码片段（标记改动前后），不直接要求执行。"
    checkpoints:
      - "是否输出了完整方案（思路、设计、改动点）"
      - "是否同时给出了代码片段（不是整个文件）"
      - "是否标记了改动前后对比"
      - "是否直接要求执行（禁止）"

  - id: W002
    name: "用户要代码时"
    level: "MUST"
    description: "禁止给整个文件，必须给 diff 格式或标记改动行。"
    checkpoints:
      - "用户说'给我代码'时，是否给了整个文件（禁止）"
      - "是否用 diff 格式展示改动"
      - "是否标记了改动前后"
      - "是否说明了改动原因"

  - id: W003
    name: "多文件改动流程"
    level: "MUST"
    description: "逐个文件展示 diff，每个文件都等用户确认后再执行，不要一次性全改。"
    checkpoints:
      - "是否逐个文件展示 diff"
      - "是否在每个文件后等待用户确认"
      - "是否一次性全改（禁止）"

  - id: W004
    name: "执行确认规则"
    level: "MUST"
    description: "根据改动量决定是否需要确认：≤3 行直接执行，>3 行或多文件必须等确认。"
    checkpoints:
      - "改动 ≤3 行时，是否直接执行"
      - "改动 >3 行时，是否等待 yes/执行/确认"
      - "多文件时，是否逐个确认"
      - "用户说'不/取消/no'时，是否立即停止"

  - id: W005
    name: "触发时机"
    level: "MUST"
    description: "以下场景必须进入 Diff First 模式。"
    checkpoints:
      - "用户说'给我代码'"
      - "用户说'先不执行'"
      - "用户说'让我看看'"
      - "用户说'review 一下'"
      - "任何代码改动前"

maintenance:
  changelog: "CHANGELOG.md"
  approval: "工作流变更需更新此文件"
